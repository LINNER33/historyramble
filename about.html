document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('aboutContent').innerHTML = `
        <p><b>循史漫记</b>是一个围绕历史阅读、专题梳理与资料整理搭建的小站。这里不追求把历史写成结论先行的判断书，而更愿意把它看作一条可以反复进入的线索：从人物、制度、战争、地理与文本之间，慢慢寻找问题的来龙去脉。</p>
        <p>目前网站的内容主要包括几类：一是历史类书籍的阅读札记与推荐，记录哪些书值得读、怎样读；二是围绕特定问题展开的专题研究，例如唐与高句丽战争及其背后的东北亚格局；三是史料片段、人物小传、学术资源与下载资料的整理，方便日后检索和继续延伸。</p>
        <p>我做这个网站，并不是为了给复杂的历史问题提供简单答案。恰恰相反，历史吸引人的地方，常常在于它不断提醒我们：任何事件都不是孤立发生的，任何选择也都受到时代结构、地理条件、制度安排与个人处境的共同限制。读史的意义，或许正在于训练一种更耐心、更审慎的理解方式。</p>
        <p>“漫记”二字，取的是边读边记、边走边看的意思。这里的文章和资料会持续更新，也会随着阅读和思考不断修订。如果你也关心历史、东亚世界、边疆与海洋、战争与制度，欢迎常来看看。</p>
        <p style="margin-top:30px;color:#8a7a6a;font-style:italic;font-size:14px;">"历史是现在与过去之间永无休止的对话。" —— 爱德华·卡尔</p>
    `;
