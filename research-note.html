<script>
document.addEventListener('DOMContentLoaded', function() {
    var params = new URLSearchParams(location.search);
    var id = params.get('id');
    var item = research.find(function(r) { return r.id === id; });
    var container = document.getElementById('researchContent');
    var titleEl = document.getElementById('pageTitle');
    if (!item) {
        container.innerHTML = '<h1>笔记未找到</h1><p style="color:#8a7a6a;">请返回<a href="research.html">专题列表</a>。</p>';
        return;
    }
    titleEl.textContent = item.title + ' — 循史漫记';
    container.innerHTML = [
        '<h1>' + item.title + '</h1>',
        '<div class="article-meta">',
        '<span>' + item.date + '</span>',
        '<span>' + item.tags.map(function(t) { return '<span class="tag">' + t + '</span>'; }).join('') + '</span>',
        '</div>',
        '<div class="article-body">' + item.content + '</div>',
        '<div style="margin-top:40px;padding-top:20px;border-top:1px solid #d4c5a9;">',
        '<a href="research.html">&larr; 返回专题列表</a>',
        '</div>'
    ].join('\n');
});
</script>
